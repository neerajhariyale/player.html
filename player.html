<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Black background to hide white flashes */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000000; }
        
        /* Iframe ko full size rakho */
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* YouTube Branding Hiding Hack (CSS level) */
        .ytp-chrome-top, .ytp-watermark, .ytp-show-cards-title { display: none !important; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('videoId');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'playsinline': 1,
                    'controls': 0,    // YouTube Controls OFF
                    'rel': 0,         // Related Videos OFF
                    'modestbranding': 1, // Logo Chhota
                    'fs': 0,          // Fullscreen Button OFF
                    'iv_load_policy': 3, // Annotations OFF
                    'disablekb': 1,   // Keyboard OFF
                    'showinfo': 0,    // Info OFF
                    'autohide': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            sendMessage('READY', { duration: player.getDuration() });
            setInterval(function() {
                if(player && player.getCurrentTime) {
                    sendMessage('TIME_UPDATE', { currentTime: player.getCurrentTime() });
                }
            }, 250);
        }

        function onPlayerStateChange(event) {
            sendMessage('STATE_CHANGE', { data: event.data });
        }

        function sendMessage(type, payload) {
            window.parent.postMessage(JSON.stringify({ type: type, payload: payload }), '*');
        }

        window.addEventListener('message', function(event) {
            if (!player) return;
            try {
                var data = JSON.parse(event.data);
                if (data.command === 'play') player.playVideo();
                if (data.command === 'pause') player.pauseVideo();
                if (data.command === 'seekTo') player.seekTo(data.seconds, true);
                if (data.command === 'setVolume') player.setVolume(data.volume);
                if (data.command === 'setPlaybackRate') player.setPlaybackRate(data.rate);
            } catch (e) {}
        });
    </script>
</body>
</html>
